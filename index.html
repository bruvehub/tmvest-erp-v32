<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>V33 ERP CLEAN FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f8;}
header{background:#111;color:#fff;padding:15px;}
.container{padding:20px;}
.kanban{display:flex;gap:10px;}
.col{flex:1;background:#e9ecef;padding:10px;border-radius:10px;min-height:200px;}
.card{background:#fff;padding:10px;margin:5px 0;border-radius:6px;}
button{cursor:pointer}
</style>
</head>

<body>

<header>
V33 ERP - SISTEMA LIMPO DEFINITIVO
</header>

<div class="container">

<h3>Kanban Produção</h3>

<div class="kanban">
  <div class="col" id="novo"><b>NOVO</b></div>
  <div class="col" id="producao"><b>PRODUÇÃO</b></div>
  <div class="col" id="revisao"><b>REVISÃO</b></div>
  <div class="col" id="finalizado"><b>FINALIZADO</b></div>
</div>

</div>

<script>
/* =========================
   🔥 V33 ENGINE ISOLADO
========================= */

const SUPABASE_URL = "https://vxmdbohixbruvgkugkky.supabase.co";
const SUPABASE_KEY = "sb_publishable_O4dBjczr22wGRnlzpN_T9g_peXJr1EB";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* -------------------------
   STATE ÚNICO (SEM CONFLITO)
------------------------- */
const state = {
  os: []
};

/* -------------------------
   RENDER LIMPO
------------------------- */
function render(os){
  const col = document.getElementById(os.status || "novo");
  if(!col) return;

  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `
    <b>${os.cliente || "Sem nome"}</b><br>
    ID: ${os.id}
  `;

  col.appendChild(el);
}

/* -------------------------
   LOAD INICIAL
------------------------- */
async function load(){
  const { data } = await sb.from("os").select("*");
  state.os = data || [];
  state.os.forEach(render);
}

/* -------------------------
   REALTIME (SEM RELOAD)
------------------------- */
sb.channel("v33-os")
.on("postgres_changes",
{
  event: "*",
  schema: "public",
  table: "os"
},
(payload) => {

  const os = payload.new;

  if(!os) return;

  render(os);
})

.subscribe();

/* -------------------------
   INIT SEGURO
------------------------- */
document.addEventListener("DOMContentLoaded", load);

</script>

</body>
</html>
