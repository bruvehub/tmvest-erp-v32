<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TM VEST ERP V32 FULL</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f8;
}

/* TOP BAR */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#111;
  color:#fff;
}

/* MENU */
.menu {
  display:flex;
  gap:15px;
}

.menu button {
  padding:8px 12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}

/* CARDS */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  padding:20px;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:12px;
}

/* KANBAN */
.kanban {
  display:flex;
  gap:10px;
  padding:20px;
}

.col {
  flex:1;
  background:#e9ecef;
  padding:10px;
  border-radius:10px;
  min-height:200px;
}

/* FLOATING */
.float {
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.float button {
  padding:10px;
  border-radius:50px;
  border:none;
  cursor:pointer;
}

.green { background:#16a34a; color:#fff; }
.blue { background:#2563eb; color:#fff; }
.purple { background:#7c3aed; color:#fff; }

</style>
</head>

<body>

<div class="topbar">
  <div>TM VEST ERP V32 FULL</div>

  <div class="menu">
    <button>Início</button>
    <button>Histórico</button>
    <button>Análise</button>
    <button>Custos</button>
    <button>Produção</button>
  </div>
</div>

<!-- CARDS -->
<div class="grid">
  <div class="card">💰 Saldo Atual: R$ 109,90</div>
  <div class="card">📈 Lucro: R$ 60,90</div>
  <div class="card">📦 Pedidos: 1</div>
</div>

<!-- KANBAN -->
<div class="kanban">
  <div class="col" id="novo">Novas</div>
  <div class="col" id="producao">Produção</div>
  <div class="col" id="revisao">Revisão</div>
  <div class="col" id="finalizado">Finalizado</div>
</div>

<!-- FLOATING TOOLS -->
<div class="float">
  <button class="purple">Chat IA</button>
  <button class="green">Gerar Orçamento</button>
  <button class="blue">Centro de Comando</button>
</div>

<script>
// SUPABASE CONFIG (colocar depois)
const SUPABASE_URL = "https://vxmdbohixbruvgkugkky.supabase.co";
const SUPABASE_KEY = "SUA_ANON_KEY";

const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadOS(){
  let { data } = await supabase.from("os").select("*");

  data.forEach(os => {
    const col = document.getElementById(os.status || "novo");
    if(col){
      const div = document.createElement("div");
      div.style.background = "#fff";
      div.style.margin = "5px";
      div.style.padding = "5px";
      div.innerText = os.cliente + " #" + os.id;
      col.appendChild(div);
    }
  });
}

supabase
  .channel("os-realtime")
  .on("postgres_changes",
    { event:"*", schema:"public", table:"os" },
    () => location.reload()
  )
  .subscribe();

loadOS();
</script>

</body>
</html>
