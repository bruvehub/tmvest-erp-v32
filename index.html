<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TM VEST ERP V32</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }
    header { padding:20px; background:#111; color:#fff; }
    .card { background:#fff; margin:20px; padding:20px; border-radius:10px; }
    .kanban { display:flex; gap:10px; padding:20px; }
    .col { flex:1; background:#eee; padding:10px; border-radius:10px; min-height:200px; }
    .os { background:#fff; margin:10px 0; padding:10px; border-radius:6px; }
  </style>
</head>

<body>

<header>
  <h2>TM VEST ERP V32 - CLEAN SYSTEM</h2>
</header>

<div class="card">
  <h3>Produção (Kanban)</h3>

  <div class="kanban">
    <div class="col" id="novo">
      <h4>Novas</h4>
    </div>

    <div class="col" id="producao">
      <h4>Produção</h4>
    </div>

    <div class="col" id="revisao">
      <h4>Revisão</h4>
    </div>

    <div class="col" id="finalizado">
      <h4>Finalizado</h4>
    </div>
  </div>
</div>

<script>
const supabaseUrl = "https://vxmdbohixbruvgkugkky.supabase.co";
const supabaseKey = "sb_publishable_O4dBjczr22wGRnlzpN_T9g_peXJr1EB";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

function addOS(os){
  const col = document.getElementById(os.status || "novo");
  if(col){
    const div = document.createElement("div");
    div.className = "os";
    div.innerText = os.cliente + " - #" + os.id;
    col.appendChild(div);
  }
}

async function loadOS(){
  let { data } = await supabase.from("os").select("*");
  data.forEach(addOS);
}

supabase
  .channel("os-v32")
  .on("postgres_changes",
    { event:"*", schema:"public", table:"os" },
    payload => {
      location.reload(); // simples e estável no começo
    }
  )
  .subscribe();

loadOS();
</script>

</body>
</html>
