<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f4f6f8;

.topbar {
  display:flex;

}

.col {
  flex:1;

  padding:10px;
  border-radius:10px;
  min-height:200px;
}

.os {
  background:#fff;
  margin:5px 0;
  padding:6px;
  border-radius:6px;
  font-size:13px;
}

.float {
  position:fixed;
  right:20px;
  bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.float button {
  padding:10px;
  border-radius:50px;
  border:none;
  cursor:pointer;
}

.green { background:#16a34a; color:#fff; }
.blue { background:#2563eb; color:#fff; }
.purple { background:#7c3aed; color:#fff; }

</style>
</head>

<body>

<div class="topbar">
  <div>TM VEST ERP V32 FULL</div>

  <div class="menu">
    <button>Início</button>
    <button>Histórico</button>
    <button>Análise</button>
    <button>Custos</button>
    <button>Produção</button>
  </div>
</div>

<div class="grid">
  <div class="card">💰 Saldo Atual: R$ 109,90</div>
  <div class="card">📈 Lucro: R$ 60,90</div>
  <div class="card">📦 Pedidos: 1</div>
</div>

<div class="kanban">
  <div class="col" id="novo">Novas</div>
  <div class="col" id="producao">Produção</div>
  <div class="col" id="revisao">Revisão</div>
  <div class="col" id="finalizado">Finalizado</div>
</div>

<div class="float">
  <button class="purple">Chat IA</button>
  <button class="green">Gerar Orçamento</button>
  <button class="blue">Centro de Comando</button>
</div>

<script>
// 🔥 SUPABASE CORRIGIDO (NÃO SOBRESCREVE VARIÁVEL)
const SUPABASE_URL = "https://vxmdbohixbruvgkugkky.supabase.co";
const SUPABASE_KEY = "sb_publishable_O4dBjczr22wGRnlzpN_T9g_peXJr1EB";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ----------------------------
// LOAD INICIAL (SEGURADO)
// ----------------------------
async function loadOS() {
  const { data, error } = await client
    .from("os")
    .select("*");

  if (error) {
    console.error("Erro Supabase:", error);
    return;
  }

  if (!data) return;

  data.forEach(renderOS);
}

// ----------------------------
// RENDER OS
// ----------------------------
function renderOS(os) {
  const status = os.status || "novo";
  const col = document.getElementById(status);

  if (!col) return;

  const div = document.createElement("div");
  div.className = "os";
  div.innerText = `${os.cliente || "Sem nome"} #${os.id}`;

  col.appendChild(div);
}

// ----------------------------
// REALTIME (CORRIGIDO)
// ----------------------------
client
  .channel("os-realtime")
  .on("postgres_changes", {
    event: "*",
    schema: "public",
    table: "os"
  }, (payload) => {

    const os = payload.new;

    if (!os) return;

    // evita reload (isso quebrava tudo antes)
    renderOS(os);
  })
  .subscribe();

// ----------------------------
loadOS();
</script>

</body>
</html>
